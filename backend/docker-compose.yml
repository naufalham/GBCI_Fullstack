version: '3.8'

services:
  api:
    build: .
    ports:
      - '3000:3000'
    environment:
      - MONGODB_URI=mongodb://mongo:27017/youapp
      - JWT_SECRET=youapp-jwt-secret-key-2024
      - JWT_EXPIRES_IN=24h
      - RABBITMQ_URI=amqp://rabbitmq:5672
      - PORT=3000
    depends_on:
      - mongo
      - rabbitmq
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - '5672:5672'
      - '15672:15672'
    restart: unless-stopped

volumes:
  mongo_data:
